version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: notes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notes_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-net

  backend:
    build: ./backend
    container_name: notes-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:password@db:5432/notes_db
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "3001:3001"
    networks:
      - notes-net

  frontend:
    build: ./frontend
    container_name: notes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:3001
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    networks:
      - notes-net

volumes:
  postgres_data:

networks:
  notes-net:
    driver: bridge
